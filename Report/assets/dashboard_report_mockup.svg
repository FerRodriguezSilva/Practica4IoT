<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Mockup dashboard de reportes del ventilador IoT</title>
  <desc id="desc">Dashboard con resumen general, indicadores, graficas de temperatura, humedad, velocidad, estado del ventilador, resumen diario, eventos automaticos y distribucion de fuentes de control.</desc>
  <defs>
    <style>
      .bg{fill:#f7f9fc}
      .sidebar{fill:#071a3a}
      .navActive{fill:#1458dc}
      .card{fill:#fff;stroke:#d9e1ec;stroke-width:1.4}
      .muted{fill:#4b587c}
      .title{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#07123b}
      .h2{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:700;fill:#07123b}
      .text{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f1b45}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#4b587c}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:11px;fill:#4b587c}
      .white{fill:#fff}
      .red{fill:#ff2035}.blue{fill:#145cff}.green{fill:#158c3c}.orange{fill:#c4690a}.purple{fill:#6421dc}
      .grid{stroke:#dfe5ee;stroke-dasharray:3 5;stroke-width:1}
      .axis{stroke:#c6cfdd;stroke-width:1.2}
      .lineRed{fill:none;stroke:#ff2035;stroke-width:2.5}
      .lineBlue{fill:none;stroke:#145cff;stroke-width:2.5}
      .lineGreen{fill:none;stroke:#158c3c;stroke-width:2.5}
      .dashBlue{fill:none;stroke:#145cff;stroke-width:2;stroke-dasharray:7 7}
      .areaRed{fill:#ff2035;opacity:.10}
      .areaGreen{fill:#18a14a;opacity:.10}
      .barGreen{fill:#35b96b;opacity:.9}
      .barOff{fill:#f2f4f8;stroke:#d7dde8}
      .chip{fill:#eef4ff;stroke:#cfdaf0}
      .shadow{filter:url(#shadow)}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2b4d" flood-opacity=".08"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect class="sidebar" width="250" height="1000"/>
  <path fill="#d9e4f2" d="M34 52c11-9 28-12 39-5-1 12-10 26-25 29 16 2 28 14 31 29-12 7-29 5-40-5-1 16-11 30-25 35-8-11-8-29 1-41-15 5-31 0-39-10 5-14 18-25 35-25-14-7-20-22-17-36 15-2 31 8 40 29Z" transform="scale(.7) translate(18 10)"/>
  <circle cx="47" cy="53" r="9" fill="#071a3a" stroke="#d9e4f2" stroke-width="4"/>
  <text class="white" x="78" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">Ventilador IoT</text>
  <text x="78" y="73" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#c8d4e5">Dashboard</text>

  <rect class="navActive" x="18" y="112" width="214" height="45" rx="6"/>
  <text class="white" x="72" y="140" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700">Resumen</text>
  <text class="white" x="32" y="140" font-family="Arial,Helvetica,sans-serif" font-size="22">⌂</text>
