  <text x="72" y="238" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#e6edf7">Humedad</text>
  <text x="32" y="238" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="#e6edf7">◌</text>
  <text x="72" y="285" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#e6edf7">Ventilador</text>
  <text x="32" y="285" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="#e6edf7">✣</text>
  <text x="72" y="332" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#e6edf7">Eventos</text>
  <text x="32" y="332" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="#e6edf7">♢</text>
  <text x="72" y="379" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#e6edf7">Historial</text>
  <text x="32" y="379" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="#e6edf7">◷</text>
  <text x="72" y="426" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#e6edf7">Configuracion</text>
  <text x="32" y="426" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="#e6edf7">⚙</text>

  <rect x="22" y="806" width="207" height="140" rx="8" fill="#10274f" stroke="#27436e"/>
  <circle cx="42" cy="834" r="6" fill="#40dc72"/>
  <text x="58" y="839" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#69ee90">Dispositivo conectado</text>
  <text class="white" x="38" y="877" font-family="Arial,Helvetica,sans-serif" font-size="15">Esp32Ventilador</text>
  <text x="38" y="917" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#d9e4f2">Ultima actualizacion:</text>
  <text x="38" y="940" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#d9e4f2">22/05/2026 15:30:45</text>

